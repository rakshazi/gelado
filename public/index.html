    <style>
      :root{
        --bg: #f5ddbe;
        --bubble-bg: #ffffff;
        --bubble-text: #5a3740;
        --gap: 1px;
        --progress-color: #e8a0b0;
        --interval: 4000;
      }

      html,body{
        height:100%;
        margin:0;
        background:var(--bg);
        /* subtle artisan-paper dot texture */
        background-image: radial-gradient(circle, rgba(90,55,64,0.07) 1px, transparent 1px);
        background-size: 22px 22px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Helvetica Neue";
      }

      a {
        color: #5a3740;
        font-weight: 500;
      }

      .container{
        position:relative;
        display:inline-block;
        overflow:visible;
      }

      #mascot{
        display:block;
        max-width:320px;
        width: min(44vw, 320px);
        height:auto;
        animation: float 3.6s ease-in-out infinite;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        transform-origin: center bottom;
        will-change: transform;
      }

      #mascot.squashing {
        animation: squash 0.56s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
      }

      @keyframes float{
        0%   { transform: translateY(0); }
        50%  { transform: translateY(-8px); }
        100% { transform: translateY(0); }
      }

      @keyframes squash {
        0%   { transform: scaleX(1)    scaleY(1)    translateY(0); }
        12%  { transform: scaleX(1.32) scaleY(0.68) translateY(8px); }
        30%  { transform: scaleX(0.80) scaleY(1.26) translateY(-16px); }
        48%  { transform: scaleX(1.12) scaleY(0.91) translateY(4px); }
        64%  { transform: scaleX(0.95) scaleY(1.07) translateY(-5px); }
        78%  { transform: scaleX(1.04) scaleY(0.97) translateY(1px); }
        90%  { transform: scaleX(0.99) scaleY(1.01); }
        100% { transform: scaleX(1)    scaleY(1)    translateY(0); }
      }

      /* particle burst */
      .particle {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        animation: particle-fly 0.65s cubic-bezier(0.15, 0.85, 0.35, 1) forwards;
        will-change: transform, opacity;
        line-height: 1;
      }
      @keyframes particle-fly {
        0%   { transform: translate(-50%, -50%) scale(1.3) rotate(0deg); opacity: 1; }
        55%  { opacity: 1; }
        100% { transform: translate(calc(-50% + var(--px)), calc(-50% + var(--py))) scale(0.15) rotate(var(--rot)); opacity: 0; }
      }

      /* expanding impact ring */
      .impact-ring {
        position: fixed;
        border-radius: 50%;
        border: 3px solid rgba(232,160,176,0.75);
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
        animation: ring-expand 0.5s ease-out forwards;
      }
      @keyframes ring-expand {
        0%   { width:  50px; height:  50px; opacity: 1; }
        100% { width: 240px; height: 240px; opacity: 0; }
      }

      /* tap hint */
      #tap-hint {
        position: absolute;
        bottom: -28px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.72rem;
        color: rgba(90,55,64,0.45);
        white-space: nowrap;
        pointer-events: none;
        transition: opacity 0.6s ease;
        letter-spacing: 0.02em;
      }
      #tap-hint.gone { opacity: 0; }

      /* comic bubble */
      .bubble{
        position:absolute;
        left: calc(100% + var(--gap));
        top: 50%;
        transform: translateY(-50%);
        max-width: 260px;
        width: 260px;
        background: var(--bubble-bg);
        color: var(--bubble-text);
        padding: 12px 14px 10px;
        border-radius: 18px;
        box-shadow: 0 6px 24px rgba(90,55,64,0.13), 0 1px 4px rgba(90,55,64,0.07);
        font-size: 0.95rem;
        line-height: 1.3;
        transition: opacity .25s ease, left .2s ease, top .2s ease;
        opacity: 1;
        pointer-events: none;
        overflow: visible;
        border: 1.5px solid rgba(232,160,176,0.35);
      }
      .bubble::before {
        content: '';
        position: absolute;
        top: 50%;
        left: -29px;
        width: 30px;
        height: 20px;
        background: #fff;
        clip-path: polygon(100% 0, 0 50%, 100% 100%);
      }

      /* progress bar at bottom of bubble */
      .bubble-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        width: 100%;
        background: rgba(232,160,176,0.18);
        border-radius: 0 0 18px 18px;
        overflow: hidden;
      }
      .bubble-progress-bar {
        height: 100%;
        width: 100%;
        background: var(--progress-color);
        transform-origin: left center;
        transform: scaleX(1);
        border-radius: 0 0 18px 18px;
      }
      .bubble-progress-bar.running {
        animation: drainBar var(--interval, 4000ms) linear forwards;
      }
      @keyframes drainBar {
        from { transform: scaleX(1); }
        to   { transform: scaleX(0); }
      }

      .bubble.hidden{ opacity: 0; }
      .bubble.pop {
        animation: bubblePop .22s ease forwards;
      }
      @keyframes bubblePop {
        0%   { transform: translateY(-50%) scale(0.93); opacity: 0; }
        70%  { transform: translateY(-50%) scale(1.03); opacity: 1; }
        100% { transform: translateY(-50%) scale(1);    opacity: 1; }
      }

      .bubble.bubble--above {
        left: calc(50% - 14px);
        top: 100%;
        transform: translateY(0) rotate(180deg);
      }
      .bubble.bubble--above::before {
        left: calc(50% - 15px);
        top: -20px;
        transform: rotate(90deg);
      }
      .bubble.bubble--above span {
        transform: translateY(0) rotate(180deg);
      }
      .bubble.bubble--above.pop {
        animation: bubblePopAbove .22s ease forwards;
      }
      @keyframes bubblePopAbove {
        0%   { transform: rotate(180deg) scale(0.93); opacity: 0; }
        70%  { transform: rotate(180deg) scale(1.03); opacity: 1; }
        100% { transform: rotate(180deg) scale(1);    opacity: 1; }
      }

      #joke { min-height: 2.5em; display:block; }

      @media (max-width:420px){
        #mascot { width: 200px; }
        .bubble { max-width: 210px; font-size: .88rem; }
      }

      /* ---- rage mode ---- */
      #mascot.raging {
        animation: rage-shake 0.06s linear infinite;
        filter: drop-shadow(0 0 10px rgba(255,80,50,0.6)) drop-shadow(0 0 28px rgba(255,120,60,0.28));
      }

      @keyframes rage-shake {
        0%   { transform: rotate(-4deg) translateX(-5px) scaleY(1.02); }
        25%  { transform: rotate(4deg)  translateX(5px)  scaleY(0.98); }
        50%  { transform: rotate(-3deg) translateX(-4px) scaleY(1.01); }
        75%  { transform: rotate(3deg)  translateX(4px)  scaleY(0.99); }
        100% { transform: rotate(-4deg) translateX(-5px) scaleY(1.02); }
      }

      body.rage-mode {
        background-color: #f5c5bc;
        transition: background-color 0.35s ease;
      }
      body:not(.rage-mode) {
        transition: background-color 1.4s ease;
      }

      body.rage-mode .bubble {
        background: #fff2f0;
        border-color: rgba(210,80,70,0.4);
        color: #6e1f1f;
        box-shadow: 0 6px 24px rgba(200,60,50,0.18), 0 1px 4px rgba(200,60,50,0.1);
        transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s;
      }
      body.rage-mode .bubble::before { background: #fff2f0; }
      body.rage-mode .bubble-progress-bar { background: #d94040; }
      body.rage-mode #tap-hint { opacity: 0; }

      /* anger puffs float up and fade */
      .anger-puff {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        line-height: 1;
        animation: anger-float 2.2s cubic-bezier(0.15, 0.7, 0.3, 1) forwards;
      }
      @keyframes anger-float {
        0%   { transform: translate(-50%, -50%) scale(0.4);  opacity: 0; }
        12%  { transform: translate(-50%, -50%) scale(1.25); opacity: 1; }
        70%  { transform: translate(calc(-50% + var(--dx)), calc(-50% - 50px)) scale(1.05); opacity: 1; }
        100% { transform: translate(calc(-50% + var(--dx)), calc(-50% - 75px)) scale(0.75) rotate(var(--rot)); opacity: 0; }
      }

      /* rage impact ring: red tint */
      .impact-ring.rage {
        border-color: rgba(220,70,50,0.8);
      }
    </style>
  </head>

        const domain = window.location.hostname;
        if (!domain) {
          contactEl.href = `javascript:alert('Hey, sweetie. Not your flavor. Put the spoon down and scoot. 🍨💅')`;
          return;
        }
        contactEl.href = `mailto:${window.location.hostname.split('.')[0]}@${window.location.hostname}`;
      }

      function restartProgressBar(duration) {
        progressBar.classList.remove('running');
        void progressBar.offsetWidth;
        progressBar.style.setProperty('animation-duration', (duration ?? INTERVAL) + 'ms');
        progressBar.classList.add('running');
      }

      function setRandomJoke() {
        if (jokeIndex >= jokes.length) { shuffle(jokes); jokeIndex = 0; }
        const text = jokes[jokeIndex++];

        bubble.classList.add('hidden');
        bubble.classList.remove('pop');

        setTimeout(() => {
          jokeEl.textContent = text;
          positionBubble();
          bubble.classList.remove('hidden');
          bubble.classList.add('pop');
          restartProgressBar();
        }, 250);
      }

      const PARTICLE_EMOJIS = ['🍦','🍧','🍨','✨','⭐','🌸','🍒','💫','🌈','🎉','🍬','🫧','🍓','💥'];

      function spawnParticles(isRage = false) {
        const rect  = mascot.getBoundingClientRect();
        const cx    = rect.left + rect.width  * 0.5;
        const cy    = rect.top  + rect.height * 0.38;
        const pool  = isRage
          ? [...PARTICLE_EMOJIS, ...ANGER_EMOJIS]
          : PARTICLE_EMOJIS;
        const count = isRage ? 14 : 11;

        for (let i = 0; i < count; i++) {
          const el = document.createElement('span');
          el.className = 'particle';
          const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.9;
          const dist  = (isRage ? 70 : 55) + Math.random() * 95;
          el.style.setProperty('--px',  (Math.cos(angle) * dist) + 'px');
          el.style.setProperty('--py',  (Math.sin(angle) * dist) + 'px');
          el.style.setProperty('--rot', (Math.random() * 500 - 250) + 'deg');
          el.style.left           = cx + 'px';
          el.style.top            = cy + 'px';
          el.style.fontSize       = (0.9 + Math.random() * 0.9) + 'rem';
          el.style.animationDelay = (Math.random() * 70) + 'ms';
          el.textContent = pool[Math.floor(Math.random() * pool.length)];
          document.body.appendChild(el);
          el.addEventListener('animationend', () => el.remove());
        }

        const ring = document.createElement('div');
        ring.className = 'impact-ring' + (isRage ? ' rage' : '');
        ring.style.left = cx + 'px';
        ring.style.top  = cy + 'px';
        document.body.appendChild(ring);
        ring.addEventListener('animationend', () => ring.remove());
      }

      /* ---- rage mode ---- */

      const ANGER_EMOJIS = ['💢','😤','🔥','⚡','💥','😡','🌋','😾','🫨','👿'];

      function spawnAngerPuff() {
        const rect = mascot.getBoundingClientRect();
        const el   = document.createElement('span');
        el.className = 'anger-puff';
        el.textContent = ANGER_EMOJIS[Math.floor(Math.random() * ANGER_EMOJIS.length)];
        const cx = rect.left + rect.width  * (0.15 + Math.random() * 0.7);
        const cy = rect.top  + rect.height * (0.05 + Math.random() * 0.55);
        el.style.left = cx + 'px';
        el.style.top  = cy + 'px';
        el.style.fontSize = (1.8 + Math.random() * 1.0) + 'rem';
        el.style.setProperty('--dx',  (Math.random() * 60 - 30) + 'px');
        el.style.setProperty('--rot', (Math.random() * 60 - 30) + 'deg');
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }

      function showRageJoke() {
        if (rageJokeIndex >= rageJokes.length) { shuffle(rageJokes); rageJokeIndex = 0; }
        const text = rageJokes[rageJokeIndex++];

        bubble.classList.add('hidden');
        bubble.classList.remove('pop');
        setTimeout(() => {
          jokeEl.textContent = text;
          positionBubble();
          bubble.classList.remove('hidden');
          bubble.classList.add('pop');
          restartProgressBar(RAGE_JOKE_INTERVAL);
        }, 220);
      }

      function enterRageMode() {
        if (rageMode) return;
        rageMode = true;
        document.body.classList.add('rage-mode');
        mascot.classList.remove('squashing');
        mascot.classList.add('raging');
        clearInterval(intervalId);
        showRageJoke();
        intervalId = setInterval(showRageJoke, RAGE_JOKE_INTERVAL);
        ragePuffId = setInterval(spawnAngerPuff, 650);
      }

      function exitRageMode() {
        if (!rageMode) return;
        rageMode = false;
        document.body.classList.remove('rage-mode');
        mascot.classList.remove('raging');
        clearInterval(ragePuffId);
        ragePuffId = null;
        clearInterval(intervalId);
        setRandomJoke();
        intervalId = setInterval(setRandomJoke, INTERVAL);
      }

      function extendRageCooldown() {
        clearTimeout(rageCooldownId);
        rageCooldownId = setTimeout(exitRageMode, RAGE_COOLDOWN);
      }

      /* ---- squeezeAndJoke ---- */

      function squeezeAndJoke() {
        if (!hintDismissed) {
          hintDismissed = true;
          tapHint.classList.add('gone');
        }

        /* rage detection */
        const now = Date.now();
        tapTimes.push(now);
        tapTimes = tapTimes.filter(t => now - t < RAGE_TAP_WINDOW);

        if (tapTimes.length >= RAGE_TAP_COUNT || rageMode) {
          if (!rageMode) enterRageMode();
          extendRageCooldown();
          spawnParticles(true);
          spawnAngerPuff();
          return;
        }

        /* normal tap */
        spawnParticles(false);

        mascot.classList.remove('squashing');
        mascot.classList.remove('raging');
        void mascot.offsetWidth;
        mascot.classList.add('squashing');
        mascot.addEventListener('animationend', () => {
          mascot.classList.remove('squashing');
          if (rageMode) mascot.classList.add('raging');
        }, { once: true });

        clearInterval(intervalId);
        setRandomJoke();
        intervalId = setInterval(setRandomJoke, INTERVAL);
      }

      function positionBubble() {
        const mRect = mascot.getBoundingClientRect();
        const cRect = container.getBoundingClientRect();

        const mouthRel = 0.62;
        const mouthY = mRect.top - cRect.top + mouthRel * mRect.height;

        const gap = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap')) || 20;
        let left = (mRect.right - cRect.left) + gap;
        let top  = mouthY - bubble.offsetHeight * 0.5;

        const minTop = 6;
        const maxTop = window.innerHeight - cRect.top - 6 - bubble.offsetHeight;
        if (top < minTop) top = minTop;
        if (top > maxTop) top = maxTop;

        const willOverflowRight = (left + bubble.offsetWidth + 260) > (window.innerWidth - 8);
        if (willOverflowRight) {
          bubble.classList.add('bubble--above');
          const centeredLeft = (mRect.left - cRect.left) + (mRect.width / 2) - (bubble.offsetWidth / 2);
          bubble.style.left = `${Math.max(8, centeredLeft)}px`;
          bubble.style.top  = `${(mRect.top - cRect.top) - bubble.offsetHeight - 12}px`;
          bubble.style.setProperty('--tail-top', `${bubble.offsetHeight - 6}px`);
        } else {
          bubble.classList.remove('bubble--above');
          bubble.style.left = `${left}px`;
          bubble.style.top  = `${top}px`;
          const clampedTailY = Math.max(8, Math.min(bubble.offsetHeight - 8, mouthY - top));
          bubble.style.setProperty('--tail-top', `${clampedTailY}px`);
        }
      }

      mascot.addEventListener('click', squeezeAndJoke);
      mascot.addEventListener('touchend', (e) => { e.preventDefault(); squeezeAndJoke(); });

      window.addEventListener('resize', positionBubble);
      window.addEventListener('scroll', positionBubble);
      window.addEventListener('orientationchange', positionBubble);
      window.addEventListener('load', setContactLink);

      function start() {
        positionBubble();
        setRandomJoke();
        intervalId = setInterval(setRandomJoke, INTERVAL);

        /* fade out the tap hint after 6 seconds if never tapped */
        setTimeout(() => {
          if (!hintDismissed) tapHint.classList.add('gone');
        }, 6000);
      }

      if (mascot.complete) {
        start();
      } else {
        mascot.addEventListener('load', start);
      }
    </script>
  </body>
</html>
